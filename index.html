<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favoritos Vinted</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --bg: #ECE7DC;
    --surface: #FFFFFF;
    --ink: #262320;
    --ink-soft: #79716699;
    --ink-soft2: #797166aa;
    --accent: #A8392E;
    --accent-2: #33495C;
    --line: #D9D2C2;
    --radius-lg: 12px;
    --radius-md: 8px;
    --radius-sm: 4px;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }
  *{ box-sizing: border-box; transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
  html,body{ margin:0; padding:0; scroll-behavior: smooth; }
  body{ background: var(--bg); color: var(--ink); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  @media (prefers-reduced-motion: reduce){ *{ transition: none !important; animation: none !important; } }

  header.tagband{
    background: var(--accent-2); color: #F3EFE4; padding: 24px 32px;
    display:flex; align-items:center; justify-content:space-between; gap: 16px; flex-wrap: wrap;
    border-bottom: 4px double #F3EFE466;
    box-shadow: 0 4px 25px rgba(0,0,0,0.06);
  }
  .brandmark{ font-family: var(--font-display); font-weight:700; letter-spacing: 0.12em; text-transform: uppercase; font-size: 24px; display:flex; align-items:baseline; gap:10px; }
  .brandmark small{ font-family: var(--font-mono); font-size:11px; letter-spacing: 0.08em; color:#F3EFE4aa; text-transform:none; }
  
  .btn-add{ font-family: var(--font-body); font-weight:600; font-size: 14px; background: var(--accent); color:#fff; border: none; border-radius: var(--radius-md); padding: 11px 22px; cursor:pointer; letter-spacing: 0.01em; box-shadow: 0 3px 8px rgba(168,57,46,0.15); }
  .btn-add:hover{ filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(168,57,46,0.25); }
  .btn-add:active{ transform: translateY(0); }

  .controls-wrapper { position: sticky; top: 0; z-index: 10; background: rgba(236, 231, 220, 0.88); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(217,210,194,0.5); }
  .controls{ max-width: 1180px; margin: 0 auto; padding: 14px 28px; display:flex; flex-wrap:wrap; gap: 10px 12px; align-items:center; }
  
  .pill{ font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; background: #fff; border: 1px solid var(--line); color: var(--ink-soft); border-radius: 999px; padding: 6px 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .pill.active{ background: var(--accent-2); border-color: var(--accent-2); color: #fff; transform: scale(1.04); box-shadow: 0 4px 10px rgba(51,73,92,0.2); }
  .pill:hover:not(.active){ border-color: var(--ink); color: var(--ink); transform: translateY(-1px); }
  
  .search-wrap{ margin-left: auto; position: relative; }
  .search-wrap input{ font-family: var(--font-body); font-size: 13.5px; border: 1px solid var(--line); background: var(--surface); border-radius: var(--radius-md); padding: 8px 14px; width: 220px; color: var(--ink); }
  .search-wrap input:focus{ outline: none; border-color: var(--accent-2); box-shadow: 0 0 0 3px rgba(51,73,92,0.12); width: 250px; background: #fff; }

  .count-line{ max-width: 1180px; margin: 14px auto 0; padding: 0 28px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.06em; }

  main{ max-width: 1180px; margin: 0 auto; padding: 10px 28px 80px; }
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 36px 24px; }
  
  @keyframes cardEntrance {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  .card{ position:relative; background: var(--surface); border-radius: var(--radius-lg); box-shadow: 0 4px 12px rgba(38,35,32,0.04), 0 1px 3px rgba(38,35,32,0.02); overflow: visible; display:flex; flex-direction:column; margin-top: 15px; animation: cardEntrance 0.55s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
  .card:hover{ transform: translateY(-6px); box-shadow: 0 16px 32px rgba(38,35,32,0.1); }
  
  .card-string{ position:absolute; top:-15px; left: 24px; width: 18px; height: 14px; border: 2px solid var(--ink-soft2); border-bottom: none; border-radius: 18px 18px 0 0; z-index: 2; transform-origin: bottom center; }
  .card:hover .card-string { transform: scaleY(1.18); }
  .card-hole{ position:absolute; top: -6px; left: 24px; width: 12px; height: 12px; border-radius: 50%; background: var(--bg); border: 1px solid var(--line); box-shadow: inset 0 1px 2px rgba(0,0,0,.12); z-index: 2; }
  
  .card-photo{ width:100%; aspect-ratio: 4 / 5; background: #F5F2EB; overflow:hidden; border-radius: var(--radius-lg) var(--radius-lg) 0 0; display:flex; align-items:center; justify-content:center; border-bottom: 1px solid rgba(0,0,0,0.02); position: relative; }
  .card-photo img{ width:100%; height:100%; object-fit:cover; display:block; transform: scale(1.001); }
  .card:hover .card-photo img { transform: scale(1.05); }
  .card-photo .noimg{ font-family: var(--font-mono); font-size: 11px; color: var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; }
  
  .card-body{ padding: 18px; display:flex; flex-direction:column; gap: 10px; flex:1; }
  
  .card-cat{ display: inline-flex; align-items: center; gap: 4px; align-self: flex-start; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-sm); background: #f0eae1; color: var(--ink); margin-bottom: 2px; }
  
  .card-header-row{ display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .card-brand{ font-family: var(--font-display); font-weight:600; font-size: 20px; line-height:1.15; color: var(--ink); text-transform: uppercase; letter-spacing: 0.04em; }
  
  .card-price{ font-family: var(--font-mono); font-weight:700; font-size: 14px; color: var(--accent-2); background: #f5f2eb; padding: 2px 7px; border-radius: var(--radius-sm); white-space: nowrap; }
  
  /* Bloco de Cor Melhorado para o Tamanho */
  .card-size{ font-family: var(--font-mono); font-size: 12px; font-weight: 600; color: var(--ink); background: #f5f2eb; padding: 5px 10px; border-radius: var(--radius-sm); border-left: 3px solid var(--line); display: inline-flex; align-items: center; gap: 6px; align-self: flex-start; margin-bottom: 4px; }
  .card:hover .card-size { background: #ebdcc5; border-left-color: var(--accent-2); }

  .card-foot{ margin-top:auto; display:flex; align-items:center; justify-content:space-between; gap:8px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .card-link{ font-family: var(--font-body); font-weight:600; font-size: 13px; color: var(--accent-2); text-decoration:none; position: relative; padding-bottom: 1px; }
  .card-link::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1.5px; background: var(--accent-2); transform: scaleX(0.3); transform-origin: left; transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1); }
  .card-link:hover::after { transform: scaleX(1); background: var(--accent); }
  .card-link:hover{ color: var(--accent); }
  
  .card-actions{ display:flex; gap: 6px; }
  .icon-btn{ background:none; border:none; cursor:pointer; color: var(--ink-soft); padding: 5px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; }
  .icon-btn svg { width: 15px; height: 15px; fill: currentColor; }
  .icon-btn:hover{ color: var(--ink); background: #f2efe7; }
  .icon-btn[data-action="delete"]:hover{ color: var(--accent); background: #fcdad7; }

  .shim-card { background: #fff; height: 350px; border-radius: var(--radius-lg); padding: 16px; display:flex; flex-direction:column; gap:12px; margin-top:15px; }
  .shim-img { width:100%; height:190px; background: linear-gradient(90deg, #eae5da 25%, #f5f2eb 50%, #eae5da 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius:var(--radius-md); }
  .shim-line { height: 12px; background: linear-gradient(90deg, #eae5da 25%, #f5f2eb 50%, #eae5da 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius:2px; }

  .empty{ text-align:center; padding: 80px 20px; color: var(--ink-soft); }
  .empty .et{ font-family: var(--font-display); font-size: 22px; color: var(--ink); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
  .empty .es{ font-size: 14px; max-width: 360px; margin: 0 auto; line-height: 1.4; }

  .overlay{ position:fixed; inset:0; background: rgba(38,35,32,0.4); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); display:flex; align-items:center; justify-content:center; padding: 12px; z-index: 50; }
  .overlay[hidden]{ display:none; }
  
  .modal{ background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 480px; box-shadow: 0 24px 60px rgba(38,35,32,0.22); animation: modalPop 0.35s cubic-bezier(0.16, 1, 0.3, 1); padding: 24px; }
  .modal h2{ font-family: var(--font-display); font-size: 20px; text-transform: uppercase; letter-spacing: .04em; margin: 0 0 16px; color: var(--ink); border-bottom: 2px solid var(--line); padding-bottom: 6px; }
  
  .form-row-2{ display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  
  @keyframes fieldFade { from{ opacity:0; transform: translateY(-4px); } to{ opacity:1; transform: translateY(0); } }
  .expandable-field { animation: fieldFade 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

  .field{ margin-bottom: 11px; display:flex; flex-direction:column; gap:4px; }
  .field label{ font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink); font-weight: 600; }
  
  .field input[type=text], .field input[type=url], .field select{ font-family: var(--font-body); font-size: 13.5px; border: 1px solid var(--line); border-radius: var(--radius-md); padding: 8px 11px; background: #fff; color: var(--ink); width: 100%; box-shadow: inset 0 1px 2px rgba(0,0,0,0.01); }
  .field input:focus, .field select:focus{ outline:none; border-color: var(--accent-2); background: #fcfcfb; box-shadow: 0 0 0 3px rgba(51,73,92,0.12); }
  
  .media-integration-grid { display: grid; grid-template-columns: 1fr 125px; gap: 14px; margin-bottom: 4px; }
  .media-left-inputs { display: flex; flex-direction: column; justify-content: space-between; }
  .media-left-inputs .field { margin-bottom: 0; }
  
  .photo-preview{ width: 125px; height: 125px; border-radius: var(--radius-md); background: #F5F2EB; overflow:hidden; display:flex; align-items:center; justify-content:center; border: 1px dashed var(--line); box-shadow: inset 0 1px 3px rgba(0,0,0,0.03); position: relative; }
  .photo-preview img{ width:100%; height:100%; object-fit:cover; animation: fieldFade 0.3s ease; }
  .photo-preview span{ font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-soft); text-transform:uppercase; text-align: center; line-height: 1.2; padding: 6px; }
  
  .modal-actions{ display:flex; justify-content:flex-end; gap: 12px; align-items:center; margin-top: 16px; border-top: 1px solid var(--line); padding-top: 14px; }
  .btn-secondary{ background:none; border:none; cursor:pointer; font-family: var(--font-body); font-weight: 500; font-size: 14px; color: var(--ink-soft); padding: 6px 12px; }
  .btn-secondary:hover{ color: var(--ink); }
  .btn-primary{ background: var(--accent-2); color:#fff; border:none; font-family: var(--font-body); font-weight:600; font-size: 14px; border-radius: var(--radius-md); padding: 9px 20px; cursor:pointer; box-shadow: 0 2px 5px rgba(51,73,92,0.15); }
  .btn-primary:hover{ filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 5px 12px rgba(51,73,92,0.22); }
  .btn-primary:active{ transform: translateY(0); }
  
  .banner{ max-width:1180px; margin: 14px auto 0; padding: 11px 28px; font-family: var(--font-mono); font-size: 12px; color:#7A2A22; background:#F7E6E2; border-radius: var(--radius-md); }
  .banner[hidden]{ display:none; }
</style>
</head>
<body>

<header class="tagband">
  <div class="brandmark">Favoritos <small>· vinted</small></div>
  <button class="btn-add" id="openAdd">+ Adicionar peça</button>
</header>

<div class="banner" id="configBanner" hidden>
  Falta configurar a ligação ao Supabase — edita SUPABASE_URL e SUPABASE_ANON_KEY no topo do ficheiro index.html.
</div>

<div class="controls-wrapper">
  <div class="controls" id="filterBar"></div>
</div>

<div class="count-line" id="countLine"></div>

<main>
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyState" hidden>
    <div class="et">O armário está vazio</div>
    <div class="es">Adiciona a tua primeira peça com foto, marca, preço, tamanho e o link da Vinted.</div>
  </div>
</main>

<div class="overlay" id="overlay" hidden>
  <div class="modal">
    <h2 id="modalTitle">Adicionar peça</h2>
    <form id="itemForm">
      
      <div class="form-row-2">
        <div class="field">
          <label for="f-categoria">Categoria</label>
          <select id="f-categoria"></select>
        </div>
        <div class="field">
          <label for="f-marca">Marca</label>
          <input type="text" id="f-marca" placeholder="ex: Zara">
        </div>
      </div>

      <div class="form-row-2 expandable-field" id="newCatField" hidden>
        <div class="field">
          <label for="f-novacategoria">Nova categoria</label>
          <input type="text" id="f-novacategoria" placeholder="ex: Vestidos">
        </div>
        <div></div>
      </div>

      <div class="form-row-2">
        <div class="field">
          <label for="f-preco">Preço</label>
          <input type="text" id="f-preco" placeholder="ex: 15€">
        </div>
        <div class="field">
          <label for="f-tamanho">Tamanho</label>
          <input type="text" id="f-tamanho" placeholder="ex: M / 38">
        </div>
      </div>

      <div class="media-integration-grid">
        <div class="media-left-inputs">
          <div class="field">
            <label for="f-foto">Foto Local</label>
            <input type="file" id="f-foto" accept="image/*">
          </div>
          <div class="field" style="margin-top: 6px;">
            <label for="f-fotolink">Ou link da imagem</label>
            <input type="url" id="f-fotolink" placeholder="https://...">
          </div>
        </div>
        <div class="photo-preview" id="photoPreview"><span>sem foto</span></div>
      </div>

      <div class="field" style="margin-top: 4px;">
        <label for="f-link">Link da Vinted</label>
        <input type="url" id="f-link" placeholder="https://www.vinted.pt/...">
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="closeModal">Cancelar</button>
        <button type="submit" class="btn-primary" id="saveBtn">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script>
(function(){
  const SUPABASE_URL = 'https://znkjxzpreakygmobzzjw.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpua2p4enByZWFreWdtb2J6emp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODIxMjEsImV4cCI6MjA5ODA1ODEyMX0.ZKfIoqiAnzw5VSJIZ3xm9334FhX4rR59-m3unE2NJP8';
  const PHOTOS_BUCKET = 'fotos';

  let sb = null;
  const isConfigured = !SUPABASE_URL.includes('SEU-PROJETO');
  if(isConfigured){
    sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }else{
    document.getElementById('configBanner').hidden = false;
  }

  const DEFAULT_CATEGORIES = ['Casacos','Camisolas','T-shirts','Calças','Ténis','Chapéus','Diversos'];
  let categories = [...DEFAULT_CATEGORIES];
  let items = [];
  let activeFilter = 'Todos';
  let searchTerm = '';
  let editingId = null;
  let pendingFile = null;
  let pendingImagePreviewUrl = null;

  const CAT_CONFIG = {
    'casacos': { bg: '#E2EBE9', co: '#2E4A43', emoji: '🧥' },
    'camisolas': { bg: '#F5EFE6', co: '#614E3D', emoji: '🧶' },
    't-shirts': { bg: '#F5E6E8', co: '#5A343C', emoji: '👕' },
    'calças': { bg: '#E3EDF7', co: '#2C4A6F', emoji: '👖' },
    'ténis': { bg: '#EAE6F3', co: '#4A3B6A', emoji: '👟' },
    'sapatilhas': { bg: '#EAE6F3', co: '#4A3B6A', emoji: '👟' },
    'calçado': { bg: '#EAE6F3', co: '#4A3B6A', emoji: '👟' },
    'chapéus': { bg: '#E1EDF2', co: '#2B4A57', emoji: '🧢' },
    'bonés': { bg: '#E1EDF2', co: '#2B4A57', emoji: '🧢' },
    'diversos': { bg: '#F1EBE4', co: '#5C4E43', emoji: '📦' }
  };

  function getCatStyle(categoryName) {
    const slug = (categoryName || '').toLowerCase().trim();
    return CAT_CONFIG[slug] || { bg: '#F0EAE1', co: 'var(--ink)', emoji: '🏷️' };
  }

  const grid = document.getElementById('grid');
  const filterBar = document.getElementById('filterBar');
  const countLine = document.getElementById('countLine');
  const emptyState = document.getElementById('emptyState');
  const overlay = document.getElementById('overlay');
  const form = document.getElementById('itemForm');
  const catSelect = document.getElementById('f-categoria');
  const newCatField = document.getElementById('newCatField');
  const newCatInput = document.getElementById('f-novacategoria');
  const photoInput = document.getElementById('f-foto');
  const photoPreview = document.getElementById('photoPreview');
  const photoLinkInput = document.getElementById('f-fotolink');
  const modalTitle = document.getElementById('modalTitle');

  function escapeHtml(s){
    return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function loadData(){
    if(!sb){ renderFilterBar(); renderGrid(); return; }
    
    grid.innerHTML = Array(4).fill(0).map(() => `
      <div class="shim-card">
        <div class="shim-img"></div>
        <div class="shim-line" style="width: 35%"></div>
        <div class="shim-line" style="width: 75%"></div>
        <div class="shim-line" style="width: 20%"></div>
      </div>
    `).join('');

    const { data: catData, error: catErr } = await sb.from('categories').select('name').order('name');
    if(!catErr && catData && catData.length){
      categories = catData.map(c => c.name);
    }

    const { data: itemData, error: itemErr } = await sb.from('items').select('*').order('created_at', { ascending: false });
    items = itemErr ? [] : (itemData || []).map(it => ({
      id: it.id, category: it.category, brand: it.brand, size: it.size, price: it.price,
      link: it.link, image: it.image_url, imagePath: it.image_path
    }));

    renderFilterBar();
    renderGrid();
  }

  function renderFilterBar(){
    const all = ['Todos', ...categories];
    filterBar.innerHTML = '';
    all.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'pill' + (cat === activeFilter ? ' active' : '');
      
      const config = getCatStyle(cat);
      const emojiSpan = cat !== 'Todos' ? `<span>${config.emoji}</span> ` : '';
      btn.innerHTML = `${emojiSpan}${cat}`;
      
      btn.addEventListener('click', () => { activeFilter = cat; renderFilterBar(); renderGrid(); });
      filterBar.appendChild(btn);
    });
    const searchWrap = document.createElement('div');
    searchWrap.className = 'search-wrap';
    searchWrap.innerHTML = '<input type="text" id="searchInput" placeholder="Pesquisar marca…">';
    filterBar.appendChild(searchWrap);
    const si = searchWrap.querySelector('#searchInput');
    si.value = searchTerm;
    si.addEventListener('input', e => { searchTerm = e.target.value.toLowerCase(); renderGrid(); });
  }

  function renderGrid(){
    const filtered = items.filter(it => {
      const catOk = activeFilter === 'Todos' || it.category === activeFilter;
      const term = searchTerm.trim();
      const searchOk = !term || (it.brand||'').toLowerCase().includes(term) || (it.category||'').toLowerCase().includes(term);
      return catOk && searchOk;
    });

    countLine.textContent = `${filtered.length} peça${filtered.length===1?'':'s'}${activeFilter!=='Todos' ? ' · ' + activeFilter : ''}`;

    if(filtered.length === 0){
      grid.innerHTML = '';
      emptyState.hidden = false;
      emptyState.querySelector('.et').textContent = items.length === 0 ? 'O armário está vazio' : 'Nada por aqui';
      emptyState.querySelector('.es').textContent = items.length === 0
        ? 'Adiciona a tua primeira peça com foto, marca, preço, tamanho e o link da Vinted.'
        : 'Sem peças nesta categoria ou pesquisa.';
      return;
    }
    emptyState.hidden = true;

    grid.innerHTML = filtered.map((it, index) => {
      const style = getCatStyle(it.category);
      
      return `
        <div class="card" data-id="${it.id}" style="animation-delay: ${index * 0.03}s">
          <div class="card-string"></div>
          <div class="card-hole"></div>
          <div class="card-photo">
            ${it.image ? `<img src="${it.image}" alt="${escapeHtml(it.brand)}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">` : ''}
            <span class="noimg" style="${it.image ? 'display:none;' : ''}">sem foto</span>
          </div>
          <div class="card-body">
            <div class="card-cat" style="background: ${style.bg}; color: ${style.co};">
              <span>${style.emoji}</span> ${escapeHtml(it.category)}
            </div>
            <div class="card-header-row">
              <div class="card-brand">${escapeHtml(it.brand) || '—'}</div>
              ${it.price ? `<div class="card-price">${escapeHtml(it.price)}</div>` : ''}
            </div>
            
            <div class="card-size">📏 Tam. ${escapeHtml(it.size) || '—'}</div>
            
            <div class="card-foot">
              ${it.link ? `<a class="card-link" href="${escapeHtml(it.link)}" target="_blank" rel="noopener">Ver na Vinted</a>` : '<span></span>'}
              <div class="card-actions">
                <button class="icon-btn" data-action="edit" data-id="${it.id}" title="Editar">
                  <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                </button>
                <button class="icon-btn" data-action="delete" data-id="${it.id}" title="Eliminar">
                  <svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join('');

    grid.querySelectorAll('[data-action="edit"]').forEach(b => b.addEventListener('click', () => openEdit(b.dataset.id)));
    grid.querySelectorAll('[data-action="delete"]').forEach(b => b.addEventListener('click', () => deleteItem(b.dataset.id)));
  }

  function populateCategorySelect(selected){
    catSelect.innerHTML = categories.map(c => {
      const config = getCatStyle(c);
      return `<option value="${escapeHtml(c)}">${config.emoji} ${escapeHtml(c)}</option>`;
    }).join('') + '<option value="__new__">➕ Nova categoria…</option>';
    if(selected) catSelect.value = selected;
    newCatField.hidden = catSelect.value !== '__new__';
  }

  catSelect.addEventListener('change', () => { newCatField.hidden = catSelect.value !== '__new__'; });

  function resetForm(){
    form.reset();
    pendingFile = null;
    pendingImagePreviewUrl = null;
    photoPreview.innerHTML = '<span>sem foto</span>';
    photoLinkInput.value='';
    populateCategorySelect();
    newCatField.hidden = true;
  }

  function openModal(title){ modalTitle.textContent = title; overlay.hidden = false; }
  function closeModal(){ overlay.hidden = true; editingId = null; resetForm(); }

  document.getElementById('openAdd').addEventListener('click', () => {
    editingId = null; resetForm(); openModal('Adicionar peça');
  });
  document.getElementById('closeModal').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(); });

  function openEdit(id){
    const it = items.find(x => x.id === id);
    if(!it) return;
    editingId = id;
    populateCategorySelect(it.category);
    document.getElementById('f-marca').value = it.brand || '';
    document.getElementById('f-preco').value = it.price || '';
    document.getElementById('f-tamanho').value = it.size || '';
    document.getElementById('f-link').value = it.link || '';
    photoLinkInput.value = it.image || '';
    pendingFile = null;
    photoPreview.innerHTML = it.image ? `<img src="${it.image}">` : '<span>sem foto</span>';
    openModal('Editar peça');
  }

  function resizeImage(file, maxW){
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxW / img.width);
          const canvas = document.createElement('canvas');
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.75);
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  photoInput.addEventListener('change', async () => {
    const file = photoInput.files[0];
    if(!file) return;
    const blob = await resizeImage(file, 800);
    pendingFile = blob;
    pendingImagePreviewUrl = URL.createObjectURL(blob);
    photoPreview.innerHTML = `<img src="${pendingImagePreviewUrl}">`;
  });

  photoLinkInput.addEventListener('input', () => {
    const url = photoLinkInput.value.trim();
    if(url){
      pendingFile = null;
      pendingImagePreviewUrl = url;
      photoPreview.innerHTML = `<img src="${url}">`;
    }else if(!photoInput.files.length){
      photoPreview.innerHTML = '<span>sem foto</span>';
    }
  });

  async function deleteItem(id){
    if(!confirm('Eliminar esta peça?')) return;
    const it = items.find(x => x.id === id);
    try{
      if(sb){
        await sb.from('items').delete().eq('id', id);
        if(it && it.imagePath){
          await sb.storage.from(PHOTOS_BUCKET).remove([it.imagePath]);
        }
      }
    }catch(e){ console.error('Erro ao eliminar', e); }
    items = items.filter(x => x.id !== id);
    renderGrid();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if(!sb){ alert('Configura primeiro o SUPABASE_URL e SUPABASE_ANON_KEY no topo do ficheiro.'); return; }

    const saveBtn = document.getElementById('saveBtn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'A guardar…';

    try{
      let category = catSelect.value;
      if(category === '__new__'){
        const newCat = newCatInput.value.trim();
        if(!newCat){ alert('Indica o nome da nova categoria.'); return; }
        category = newCat;
        if(!categories.includes(newCat)){
          await sb.from('categories').insert({ name: newCat });
          categories.push(newCat);
        }
      }

      let imageUrl = null, imagePath = null;
      const imageLink = photoLinkInput.value.trim();
      const existing = editingId ? items.find(x => x.id === editingId) : null;
      if(imageLink){
        imageUrl = imageLink;
        imagePath = null;
      } else if(pendingFile){
        const path = `item-${Date.now()}-${Math.random().toString(36).slice(2,7)}.jpg`;
        const { error: upErr } = await sb.storage.from(PHOTOS_BUCKET).upload(path, pendingFile, { contentType: 'image/jpeg' });
        if(upErr) throw upErr;
        const { data: pub } = sb.storage.from(PHOTOS_BUCKET).getPublicUrl(path);
        imageUrl = pub.publicUrl;
        imagePath = path;
        if(existing && existing.imagePath){
          await sb.storage.from(PHOTOS_BUCKET).remove([existing.imagePath]);
        }
      } else if(existing){
        imageUrl = existing.image;
        imagePath = existing.imagePath;
      }

      const payload = {
        category,
        brand: document.getElementById('f-marca').value.trim(),
        price: document.getElementById('f-preco').value.trim(),
        size: document.getElementById('f-tamanho').value.trim(),
        link: document.getElementById('f-link').value.trim(),
        image_url: imageUrl,
        image_path: imagePath
      };

      if(editingId){
        const { error } = await sb.from('items').update(payload).eq('id', editingId);
        if(error) throw error;
      } else {
        const { error } = await sb.from('items').insert(payload);
        if(error) throw error;
      }

      await loadData();
      closeModal();
    }catch(err){
      console.error(err);
      alert('Não foi possível guardar: ' + (err.message || err));
    }finally{
      saveBtn.disabled = false;
      saveBtn.textContent = 'Guardar';
    }
  });

  loadData();
})();
</script>
</body>
</html>
