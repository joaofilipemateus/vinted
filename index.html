<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Closet Vinted</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { max-width: 100%; height: auto; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>O Meu Closet</h1>
    <div>
        <input type="text" id="marca" placeholder="Marca">
        <input type="text" id="link" placeholder="Link">
        <button onclick="adicionar()">Guardar</button>
    </div>

    <div class="grid" id="lista"></div>

    <script>
        // Configuração única - garantindo que 'supabase' só é declarado uma vez
        const supabaseUrl = 'https://eruhimxndstwsjgcvbac.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVydWhpbXhuZHN0d3NqZ2N2YmFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTU5Mzg1ODIsImV4cCI6MjAzMTUxNDU4Mn0.ejQ87s-N649LqKk4pXfW4pWzS0iWd7n1-vJ8P0bN9-w';
        
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function carregar() {
            const { data, error } = await supabase.from('Favoritos').select('*');
            if (error) { console.error("Erro ao carregar:", error); return; }
            
            const lista = document.getElementById('lista');
            lista.innerHTML = data.map(i => `
                <div class="card">
                    <h4>${i.Marca}</h4>
                    <a href="${i.Link}" target="_blank">Ver</a>
                    <button onclick="apagar(${i.id})">Apagar</button>
                </div>
            `).join('');
        }

        async function adicionar() {
            const m = document.getElementById('marca').value;
            const l = document.getElementById('link').value;
            const { error } = await supabase.from('Favoritos').insert([{ Marca: m, Link: l }]);
            if (error) { console.error("Erro ao inserir:", error); }
            else { carregar(); }
        }

        async function apagar(id) {
            const { error } = await supabase.from('Favoritos').delete().eq('id', id);
            if (error) { console.error("Erro ao apagar:", error); }
            else { carregar(); }
        }

        carregar();
    </script>
</body>
</html>
